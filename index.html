<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Revista Biótopo</title>
    <style>
        body {
            margin: 0;
            background-color: #2c2c2c; /* Fundo escuro profissional */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .page {
            background-color: white;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        }
        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Encaixa a imagem inteira sem NENHUM corte */
            pointer-events: none; /* Impede de arrastar as imagens por engano */
        }
    </style>
</head>
<body>

    <div id="book"></div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const book = document.getElementById('book');
            
            // Injeta as 40 páginas de forma super rápida
            let pagesHTML = '';
            for (let i = 1; i <= 40; i++) {
                pagesHTML += `<div class="page"><img src="${i}.png" alt="Página ${i}"></div>`;
            }
            book.innerHTML = pagesHTML;

            // Configuração exata para o teu formato 1414x2000
            const pageFlip = new St.PageFlip(book, {
                width: 707,
                height: 1000,
                size: "fit",
                minWidth: 300,
                maxWidth: 1414,
                minHeight: 400,
                maxHeight: 2000,
                showCover: true,
                maxShadowOpacity: 0.3
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
        });
    </script>
</body>
</html>
