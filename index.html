<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revista Digital</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4; /* Cor de fundo atrás da revista */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .flip-book {
            display: none; /* Oculta a estrutura até a biblioteca carregar */
        }
        .page {
            background-color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Mantém a imagem inteira no ecrã sem cortes ou zoom */
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="book" class="flip-book">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const book = document.getElementById('book');
            const totalPages = 40;

            // Gera as 40 páginas dinamicamente com extensão .png
            for (let i = 1; i <= totalPages; i++) {
                const page = document.createElement('div');
                page.className = 'page';
                
                const img = document.createElement('img');
                img.src = `${i}.png`; // Nome dos ficheiros: 1.png, 2.png, etc.
                img.alt = `Página ${i}`;
                img.draggable = false;
                
                page.appendChild(img);
                book.appendChild(page);
            }

            book.style.display = 'block';

            // Configuração técnica da revista digital
            const pageFlip = new St.PageFlip(book, {
                width: 1414,          // Resolução de largura da imagem
                height: 2000,         // Resolução de altura da imagem
                size: "fit",          // Garante o redimensionamento responsivo para o Google Sites
                minWidth: 315,
                maxWidth: 1414,
                minHeight: 420,
                maxHeight: 2000,
                maxShadowOpacity: 0.25, // Intensidade da sombra central
                showCover: true,      // Define a página 1 como capa isolada (sem a página branca na esquerda)
                mobileScrollSupport: false
            });

            // Inicializa o efeito de folhear com as páginas criadas
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
        });
    </script>
</body>
</html>
