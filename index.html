<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Revista Biótopo</title>
    <style>
        /* Fundo do site e remoção de barras de scroll */
        body { 
            margin: 0; 
            background-color: #f4f4f4; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        
        /* A caixa limitadora que impede a revista de encolher para 0 px */
        .container { 
            width: 95vw; 
            height: 95vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .flip-book { 
            box-shadow: 0 0 30px rgba(0,0,0,0.3); 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="flip-book" id="flipbook"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script>
        const flipbookContainer = document.getElementById('flipbook');
        const totalPaginas = 40; 
        const listaDeImagens = [];

        // Prepara a lista de imagens (1.jpg até 40.jpg)
        for (let i = 1; i <= totalPaginas; i++) {
            listaDeImagens.push(`${i}.jpg`);
        }

        // Configuração blindada para as tuas novas imagens
        const pageFlip = new St.PageFlip(flipbookContainer, {
            width: 707,      // Dimensão lógica base (ajuda na performance)
            height: 1000, 
            size: "fit",     // Obriga a revista a preencher o ecrã sem cortar nada
            minWidth: 315,
            minHeight: 420,
            maxWidth: 1414,  // O limite máximo com a tua resolução exata!
            maxHeight: 2000,
            showCover: true, // Mantém a sincronia das folhas duplas (essencial para o design contínuo)
            usePortrait: false 
        });
        
        // Carrega as imagens e avisa de imediato caso alguma falhe
        pageFlip.loadFromImages(listaDeImagens).catch((erro) => {
            console.error("Erro a carregar:", erro);
            alert("Atenção: Não foi possível carregar as fotos. Confirma se os ficheiros terminaram todos em .jpg (minúsculas).");
        });
    </script>
</body>
</html>
