<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revista Biótopo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Ocupa a altura toda do embed no Google Sites */
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="book"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const book = document.getElementById('book');

            // Configuração da revista
            const pageFlip = new St.PageFlip(book, {
                width: 1414,
                height: 2000,
                size: "fit", // Ajusta ao ecrã
                minWidth: 315,
                maxWidth: 1414,
                minHeight: 420,
                maxHeight: 2000,
                maxShadowOpacity: 0.3,
                showCover: true,
                mobileScrollSupport: false,
                usePortrait: true // Ajuda a manter as proporções certas
            });

            // Criar a lista de imagens automaticamente
            const imageUrls = [];
            for (let i = 1; i <= 40; i++) {
                imageUrls.push(`${i}.png`);
            }

            // O método loadFromImages resolve os bugs porque obriga a pré-carregar
            pageFlip.loadFromImages(imageUrls);
        });
    </script>
</body>
</html>
