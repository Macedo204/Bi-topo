<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Revista Biótopo</title>
    <style>
        /* Fundo do site e sombra do livro */
        body { margin: 0; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .flip-book { box-shadow: 0 0 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="flip-book" id="flipbook"></div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script>
        const flipbookContainer = document.getElementById('flipbook');
        const totalPaginas = 40;
        const listaDeImagens = [];

        // Prepara a lista de imagens (1.jpg, 2.jpg, etc.) e guarda na memória
        for (let i = 1; i <= totalPaginas; i++) {
            listaDeImagens.push(`${i}.jpg`);
        }

        // Configuração do livro
        const pageFlip = new St.PageFlip(flipbookContainer, {
            width: 400, // Largura de uma única página
            height: 600, // Altura de uma única página
            showCover: true // A primeira e última imagem funcionam como capas
        });
        
        // A magia acontece aqui: carregamos as imagens diretamente sem HTML extra!
        pageFlip.loadFromImages(listaDeImagens);
    </script>
</body>
</html>
