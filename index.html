<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Revista Biótopo</title>
    <style>
        /* Fundo do site e alinhamento */
        body { margin: 0; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .flip-book { box-shadow: 0 0 30px rgba(0,0,0,0.3); } 
    </style>
</head>
<body>
    <div class="flip-book" id="flipbook"></div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script>
        const flipbookContainer = document.getElementById('flipbook');
        const totalPaginas = 40; 
        const listaDeImagens = [];

        // Prepara a lista de imagens (1.jpg até 40.jpg)
        for (let i = 1; i <= totalPaginas; i++) {
            listaDeImagens.push(`${i}.jpg`);
        }

        const pageFlip = new St.PageFlip(flipbookContainer, {
            width: 707,  // Tamanho lógico da página (exatamente metade da tua proporção)
            height: 1000, // Tamanho lógico (metade de 2000)
            size: "fit",  // Magia aqui: obriga o livro a caber sempre no ecrã inteiro sem cortar
            showCover: true, // Mantém o alinhamento correto das páginas duplas (como a do pássaro)
            minWidth: 350,
            minHeight: 500,
            maxWidth: 1414, // Limite máximo para manter a nitidez
            maxHeight: 2000,
            drawingSpeed: 5, 
            usePortrait: false 
        });
        
        pageFlip.loadFromImages(listaDeImagens);
    </script>
</body>
</html>
