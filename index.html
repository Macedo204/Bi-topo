<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Revista Biótopo</title>
    <style>
        /* Fundo do site e sombra do livro */
        body { margin: 0; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .flip-book { box-shadow: 0 0 30px rgba(0,0,0,0.3); } 
    </style>
</head>
<body>
    <div class="flip-book" id="flipbook"></div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script>
        const flipbookContainer = document.getElementById('flipbook');
        const totalPaginas = 40; 
        const listaDeImagens = [];

        // Prepara a lista de imagens (1.jpg, 2.jpg... 40.jpg)
        for (let i = 1; i <= totalPaginas; i++) {
            listaDeImagens.push(`${i}.jpg`);
        }

        // Configuração com a resolução exata de 2482 x 3510
        const pageFlip = new St.PageFlip(flipbookContainer, {
            width: 2482, 
            height: 3510, 
            showCover: true, // Mantém as folhas duplas sincronizadas
            minWidth: 400,   // Tamanho mínimo para telemóveis
            minHeight: 565,  // Proporção ajustada para o tamanho mínimo
            maxWidth: 2482,  // Limita ao tamanho real para máxima nitidez
            maxHeight: 3510,
            drawingSpeed: 5, 
            usePortrait: false 
        });
        
        // Carrega as imagens e inicializa o livro
        pageFlip.loadFromImages(listaDeImagens);
    </script>
</body>
</html>
