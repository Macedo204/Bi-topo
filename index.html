<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Revista Biótopo</title>
    <style>
        /* Estilos para centrar o livro e dar-lhe sombra */
        body { margin: 0; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .flip-book { box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .page { background-color: white; background-size: cover; background-position: center; }
    </style>
</head>
<body>
    <div class="flip-book" id="flipbook"></div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script>
        const flipbookContainer = document.getElementById('flipbook');
        const totalPaginas = 40; // <-- Muda este número consoante as páginas da edição

        // Ciclo que cria as 40 páginas automaticamente
        for (let i = 1; i <= totalPaginas; i++) {
            const div = document.createElement('div');
            div.className = 'page';
            // Vai procurar as imagens 1.jpg, 2.jpg... até 40.jpg
            div.style.backgroundImage = `url('${i}.jpg')`;
            flipbookContainer.appendChild(div);
        }

        // Inicialização e configuração das medidas
        const pageFlip = new St.PageFlip(flipbookContainer, {
            width: 400, // Largura de uma única página
            height: 600, // Altura de uma única página
            showCover: true // A primeira imagem atua como uma capa rígida
        });
        
        pageFlip.loadFromHTML(document.querySelectorAll('.page'));
    </script>
</body>
</html>
