<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revista Biótopo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c2c2c; /* Mudei para um fundo escuro, fica muito mais elegante tipo Heyzine */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        /* Este contentor define os limites máximos para a revista não explodir */
        .book-container {
            width: 95vw;
            height: 95vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .page {
            background-color: white;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05); /* Sombra ligeira de página */
        }
        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Como a proporção matemática já está no JS, o cover encaixa perfeito sem cortar */
            pointer-events: none; /* Impede que arrastes a imagem com o rato por engano */
        }
    </style>
</head>
<body>

    <div class="book-container">
        <div id="book"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const book = document.getElementById('book');

            // 1. Cria as páginas diretamente no HTML
            for (let i = 1; i <= 40; i++) {
                const page = document.createElement('div');
                page.className = 'page';
                page.innerHTML = `<img src="${i}.png" alt="Página ${i}">`;
                book.appendChild(page);
            }

            // 2. Inicializa a revista com as medidas fixadas
            const pageFlip = new St.PageFlip(book, {
                width: 707,   // Proporção exata (metade de 1414) para não bloquear o browser
                height: 1000, // Proporção exata (metade de 2000)
                size: "fit",  // Adapta o tamanho final ao ecrã sem desformatar
                minWidth: 300,
                maxWidth: 1414,
                minHeight: 400,
                maxHeight: 2000,
                showCover: true, // Capa sozinha à direita
                maxShadowOpacity: 0.3
            });

            // 3. Arranca a revista
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
        });
    </script>
</body>
</html>
